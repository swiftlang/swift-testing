name: Pull request

permissions:
  contents: read

on:
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  list-xcodes:
    name: List available Xcode versions
    runs-on: [self-hosted, macos]
    steps:
      - name: List available Xcode versions
        run: |
            ls -ld /Applications/*Xcode*
  tests:
    name: Test
    uses: swiftlang/github-workflows/.github/workflows/swift_package_test.yml@0.0.13
    with:
      linux_swift_versions: '["nightly-main", "nightly-6.4.x"]'
      linux_os_versions: '["jammy", "amazonlinux2023", "fedora41"]'
      linux_static_sdk_versions: '["nightly-main", "nightly-6.4.x"]'
      windows_swift_versions: '["nightly-main", "nightly-6.4.x"]'
      enable_macos_checks: true
      macos_xcode_versions: '["swift_6.4"]'
      enable_ios_checks: true
      ios_host_xcode_versions: '["swift_6.4"]'
      enable_wasm_sdk_build: true
      wasm_sdk_versions: '["nightly-main", "nightly-6.4.x"]'
      enable_android_sdk_build: true
      android_ndk_versions: '["r28c", "r29"]'
      android_sdk_versions: '["nightly-main", "nightly-6.4.x"]'
      android_sdk_triples: '["aarch64-unknown-linux-android33", "x86_64-unknown-linux-android28"]'
      enable_android_sdk_checks: true
      enable_freebsd_checks: true
      freebsd_swift_versions: '["nightly-main"]'
      freebsd_os_versions: '["14.3"]'
  soundness:
    name: Soundness
    uses: swiftlang/github-workflows/.github/workflows/soundness.yml@0.0.13
    with:
      license_header_check_project_name: "Swift"
      docs_check_enabled: false
      format_check_enabled: false
      api_breakage_check_enabled: false
  build-verdict:
    name: Build Verdict
    runs-on: ubuntu-latest
    needs:
      - list-xcodes
      - tests
      - soundness
    if: always()  # Runs even if previous jobs fail so it can evaluate them
    steps:
      - name: Install required tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends coreutils jq
      - name: Check upstream job statuses
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          failed=$(printf '%s' "$NEEDS_JSON" | jq -r 'to_entries | map(select(.value.result != "success")) | .[] | "\(.key): \(.value.result)"')
          if [ -n "$failed" ]; then
            echo "The following required jobs did not succeed:"
            printf '%s\n' "$failed"
            exit 1
          fi
          echo "All required jobs succeeded."
